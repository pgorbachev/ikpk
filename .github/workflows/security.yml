name: Security

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: '19 4 * * 1'

permissions:
  contents: read

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dependency-audit:
    name: Runtime dependency audit (${{ matrix.package }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - web
          - scripts

    defaults:
      run:
        working-directory: ${{ matrix.package }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ${{ matrix.package }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Audit runtime dependencies
        run: npm run audit:prod

  cms-dependency-report:
    name: CMS runtime dependency audit (report only)
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: cms

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: cms/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate runtime audit report
        run: |
          npm audit --omit=dev --json > audit-report.json || true

      - name: Upload runtime audit report
        uses: actions/upload-artifact@v4
        with:
          name: cms-runtime-audit-report
          path: cms/audit-report.json

      - name: Visibility note
        run: |
          echo "CMS audit is report-only because Strapi 5.40.0 currently carries upstream advisories with no clean automatic fix."
