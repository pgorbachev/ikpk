name: Lighthouse CI

# Бюджеты из docs/kpi-validation.md, медиана 5 прогонов на 4 шаблонах
# (конфиг: web/lighthouserc.cjs).
#
# СТАТУС ГЕЙТА: с Этапа 2 (медиа самохостятся, оверсайз даунскейлится)
# все 4 шаблона проходят бюджеты — чек включается в required checks main.

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: lighthouse-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lhci:
    name: Lighthouse budgets (4 templates, median of 5)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Run Lighthouse CI
        run: npx lhci autorun
